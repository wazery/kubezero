apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kind-apps
  namespace: kubezero
spec:
  destination:
    server: https://127.0.0.1:49579
    namespace: default
  project: default
  source:
    repoURL: https://github.com/wazery/kubezero
    targetRevision: HEAD
    path: registry/dev
  syncPolicy:
    automated:
      selfHeal: true
      prune: true